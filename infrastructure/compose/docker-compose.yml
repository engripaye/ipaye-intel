services:
  postgres:
    image: postgres17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegisforge}
      POSTGRES_USER: ${POSTGRES_USER:-aegisforge}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  control-plane:
    build:
      
