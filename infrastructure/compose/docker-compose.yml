services:
  postgres:
    image: postgres17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegisforge}
      POSTGRES_USER: ${POSTGRES_USER:-aegisforge}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  control-plane:
    build:
      context: ../../apps/control-plane
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aegisforge}
      POSTGRES_USER: ${POSTGRES_USER:-aegisforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegisforge}
      API_BOOSTRAP_ENABLED: ${API_BOOTSTRAP_ENABLED:-true}
    ports:
    - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  scanner-worker:
    build:
      context: ../../apps/scanner-worker
    environment:
      SCANNER_DATABASE_SDN: postgresql://${POSTGRES_USER:-aegisforge}:${POSTGRES_PASSWORD:-aegisforge}@postgres:5432/${POSTGRES_DB:-aegisforge}
      WORKER_ID: ${WORKER_ID:-local-worker-1}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      control-plane:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true



