name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scanner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/scanner-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q src tests

  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/control-plane
    steps:
      - uses: action/checkout@v4
      - uses: action/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

